name: Python wheels (cibuildwheel)

# pybind11 バインディングを cibuildwheel でビルドする:
#   - Linux (manylinux x86_64)
#   - macOS (universal2 = x86_64 + arm64, macos-14 ランナー1本)
#   - Windows (AMD64, vendored win-iconv + static zlib で self-contained)
# PyPI 公開は行わない — 公開準備までがスコープ。

on:
  push:
    branches:
      - win64-build
      - claude/new-session-gpnx2m
    paths:
      - "python/pybind_libpst.cpp"
      - "libpst_py/**"
      - "src/**"
      - "CMakeLists.txt"
      - "cmake/**"
      - "pyproject.toml"
      - "tests/**"
      - ".github/workflows/wheels.yml"
  pull_request:
    paths:
      - "python/pybind_libpst.cpp"
      - "libpst_py/**"
      - "src/**"
      - "CMakeLists.txt"
      - "cmake/**"
      - "pyproject.toml"
      - "tests/**"
      - ".github/workflows/wheels.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Fast always-on integration test on Linux: build one wheel, install it,
  # and run the smoke/reproducer tests from a directory where the source
  # package cannot shadow the installed extension.
  integration-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev
          python -m pip install --upgrade pip build pytest
      - name: build wheel
        run: python -m build --wheel --outdir dist
      - name: install wheel
        run: pip install dist/*.whl
      - name: run tests (outside repo root to avoid source shadowing)
        run: |
          mkdir -p /tmp/run && cd /tmp/run
          pytest "$GITHUB_WORKSPACE/tests" -q

  build-wheels:
    name: wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: build wheels
        uses: pypa/cibuildwheel@v2.21
        # Configuration (target CPythons, per-OS deps, archs, test command)
        # lives in pyproject.toml under [tool.cibuildwheel]. cibuildwheel runs
        # the platform wheel-repair tool (auditwheel on Linux, delocate on
        # macOS) automatically; the Windows wheel is statically self-contained.

      - name: verify wheels (repair tooling + contents)
        shell: bash
        run: |
          # Use whichever interpreter the runner provides (macOS images expose
          # python3, not python) in an isolated venv so PEP 668
          # (externally-managed-environment on the Homebrew Python) can't block
          # the pip installs.
          PY=$(command -v python3 || command -v python)
          "$PY" -m venv /tmp/verifyenv
          VPY=/tmp/verifyenv/bin/python
          [ -x "$VPY" ] || VPY=/tmp/verifyenv/Scripts/python
          ls -l wheelhouse
          for w in wheelhouse/*.whl; do
            echo "::group::$w"
            "$VPY" -m zipfile -l "$w"
            echo "::endgroup::"
          done
          # Confirm each wheel carries no unexpected external deps.
          if [ "${{ runner.os }}" = "Linux" ]; then
            "$VPY" -m pip install auditwheel
            for w in wheelhouse/*.whl; do "$VPY" -m auditwheel show "$w" || true; done
          elif [ "${{ runner.os }}" = "macOS" ]; then
            "$VPY" -m pip install delocate
            for w in wheelhouse/*.whl; do "$VPY" -m delocate.cmd.delocate_listdeps "$w" || true; done
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: build sdist
        run: |
          sudo apt-get update && sudo apt-get install -y zlib1g-dev
          python -m pip install --upgrade build pytest
          python -m build --sdist --outdir dist
      - name: install from sdist and smoke-test
        # Builds the extension from the sdist tarball alone, proving the sdist
        # ships every source (including the GPL C core) needed to compile.
        run: |
          python -m pip install dist/*.tar.gz
          mkdir -p /tmp/run && cd /tmp/run
          pytest "$GITHUB_WORKSPACE/tests" -q
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
