name: Python wheels (cibuildwheel)

# pybind11 バインディングを cibuildwheel でビルドする:
#   - Linux (manylinux x86_64)
#   - macOS (universal2 = x86_64 + arm64, macos-14 ランナー1本)
#   - Windows (AMD64, vendored win-iconv + static zlib で self-contained)
# PyPI 公開は行わない — 公開準備までがスコープ。

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "python/pybind_libpst.cpp"
      - "libpst_py/**"
      - "src/**"
      - "CMakeLists.txt"
      - "cmake/**"
      - "pyproject.toml"
      - "tests/**"
      - ".github/workflows/wheels.yml"
      - ".github/RELEASE_TAG"
  pull_request:
    paths:
      - "python/pybind_libpst.cpp"
      - "libpst_py/**"
      - "src/**"
      - "CMakeLists.txt"
      - "cmake/**"
      - "pyproject.toml"
      - "tests/**"
      - ".github/workflows/wheels.yml"
  workflow_dispatch:

# Default the token to read-only; the publish-release job carries its own
# job-level `contents: write` to attach wheels to a Release.
permissions:
  contents: read

jobs:
  # Fast always-on integration test on Linux: build one wheel, install it,
  # and run the smoke/reproducer tests from a directory where the source
  # package cannot shadow the installed extension.
  integration-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev
          python -m pip install --upgrade pip build pytest
      - name: build wheel
        run: python -m build --wheel --outdir dist
      - name: install wheel
        run: pip install dist/*.whl
      - name: run tests (outside repo root to avoid source shadowing)
        run: |
          mkdir -p /tmp/run && cd /tmp/run
          pytest "$GITHUB_WORKSPACE/tests" -q

  build-wheels:
    name: wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: build wheels
        uses: pypa/cibuildwheel@7940a4c0e76eb2030e473a5f864f291f63ee879b # v2.21.3
        # Configuration (target CPythons, per-OS deps, archs, test command)
        # lives in pyproject.toml under [tool.cibuildwheel]. cibuildwheel runs
        # the platform wheel-repair tool (auditwheel on Linux, delocate on
        # macOS) automatically; the Windows wheel is statically self-contained.

      - name: verify wheels (repair tooling + contents)
        shell: bash
        run: |
          # Use whichever interpreter the runner provides (macOS images expose
          # python3, not python) in an isolated venv so PEP 668
          # (externally-managed-environment on the Homebrew Python) can't block
          # the pip installs.
          PY=$(command -v python3 || command -v python)
          "$PY" -m venv /tmp/verifyenv
          VPY=/tmp/verifyenv/bin/python
          [ -x "$VPY" ] || VPY=/tmp/verifyenv/Scripts/python
          ls -l wheelhouse
          for w in wheelhouse/*.whl; do
            echo "::group::$w"
            "$VPY" -m zipfile -l "$w"
            echo "::endgroup::"
          done
          # Confirm each wheel carries no unexpected external deps.
          if [ "${{ runner.os }}" = "Linux" ]; then
            "$VPY" -m pip install auditwheel
            for w in wheelhouse/*.whl; do "$VPY" -m auditwheel show "$w" || true; done
          elif [ "${{ runner.os }}" = "macOS" ]; then
            "$VPY" -m pip install delocate
            for w in wheelhouse/*.whl; do "$VPY" -m delocate.cmd.delocate_listdeps "$w" || true; done
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: build sdist
        run: |
          sudo apt-get update && sudo apt-get install -y zlib1g-dev
          python -m pip install --upgrade build pytest
          python -m build --sdist --outdir dist
      - name: install from sdist and smoke-test
        # Builds the extension from the sdist tarball alone, proving the sdist
        # ships every source (including the GPL C core) needed to compile.
        run: |
          python -m pip install dist/*.tar.gz
          mkdir -p /tmp/run && cd /tmp/run
          pytest "$GITHUB_WORKSPACE/tests" -q
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # Publish the built wheels (+ sdist) to the GitHub Release named by
  # .github/RELEASE_TAG (or the pushed tag), so users can `pip install` without
  # a compiler. Runs only on a push to main or a v* tag — never on PRs. Shares
  # the Release with build-windows.yml (readpst.exe); both create-if-missing and
  # upload with --clobber, so their run order does not matter.
  publish-release:
    name: publish wheels to Release
    needs: [build-wheels, sdist]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: collect wheels + sdist
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: sdist
          path: dist
      - name: publish to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -f .github/RELEASE_TAG ]]; then
            tag="$(tr -d '[:space:]' < .github/RELEASE_TAG)"
          else
            echo "no tag / RELEASE_TAG; nothing to publish"; exit 0
          fi
          [ -n "$tag" ] || { echo "empty RELEASE_TAG; skip"; exit 0; }
          echo "publishing wheels to release $tag"
          ls -l dist
          # Create the release if neither this job nor build-windows.yml has yet;
          # ignore a create race (the other workflow may win) and rely on the
          # idempotent --clobber upload.
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --target "$GITHUB_SHA" \
              --title "libpst-win64 $tag — readpst.exe + libpst_py wheels" \
              --notes "libpst_py wheels (Linux manylinux / macOS universal2 / Windows AMD64, CPython 3.10-3.13) and sdist. readpst.exe is attached by the Windows build job." \
            || echo "release create raced or exists; continuing to upload"
          fi
          gh release upload "$tag" dist/*.whl dist/*.tar.gz --clobber
