name: OpenSSF Scorecard

# Supply-chain security posture analysis. Runs the OpenSSF Scorecard checks
# (branch protection, pinned dependencies, token permissions, dangerous
# workflow patterns, ...) and uploads the results to the repository's
# code-scanning tab. Advisory: not part of any required-checks set.

on:
  branch_protection_rule:
  schedule:
    - cron: '41 5 * * 1'   # weekly, off-peak
  push:
    branches:
      - main
  workflow_dispatch:

# Default to read-only; the analysis job requests exactly what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the SARIF results to the code-scanning dashboard.
      security-events: write
      # Needed for GitHub's OIDC token when publish_results is true.
      id-token: write
    steps:
      - name: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: run scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishes the score to the public OpenSSF REST API / badge.
          publish_results: true

      - name: upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3.37.1
        with:
          sarif_file: results.sarif
