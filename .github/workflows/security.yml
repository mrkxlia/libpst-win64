name: Security checks (fuzzing, ASAN/UBSAN, static analysis)

# 信頼できない .pst を解析する C パーサーのメモリ安全性検証。
# - fuzz: libFuzzer (clang) でコアパース経路と RTF 展開を探索的に短時間 fuzz。
#   **これは探索的ジョブでありゲートではない** — 20年もののパーサーは fuzz の度に
#   新規の潜在バグを見つけうるため、新規クラッシュはアーティファクト+サマリで
#   報告するがジョブは失敗させない。回帰の確定ゲートは asan-ubsan (下記)。
#   継続的な深掘り fuzz は cflite_batch.yml (ClusterFuzzLite) が担う。
# - asan-ubsan: 修正済みバグの再現コーパス+有効フィクスチャを ASAN+UBSAN で再生し、
#   既知バグの回帰を確定的に検出する (**ハードゲート**)。LE マクロ単体テストも実行。
# - static-analysis / coverage / strict-warnings: 参考情報 (非ゲート)。

on:
  push:
    branches:
      - win64-build
      - claude/new-session-gpnx2m
    paths:
      - "src/**"
      - "fuzz/**"
      - "regression/fuzz-corpus/**"
      - ".github/workflows/security.yml"
      - "configure.ac"
  pull_request:
    paths:
      - "src/**"
      - "fuzz/**"
      - "regression/fuzz-corpus/**"
      - ".github/workflows/security.yml"
      - "configure.ac"
  workflow_dispatch:

permissions:
  contents: read

env:
  COMMON_SRCS: src/debug.c src/libpst.c src/libstrfunc.c src/lzfu.c src/timeconv.c src/vbuf.c
  SAN_OPTS: allocator_may_return_null=1

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm autoconf automake libtool \
            autoconf-archive gettext autopoint pkg-config zlib1g-dev libgsf-1-dev

      - name: generate config.h
        run: |
          autoreconf -fiv
          ./configure --enable-python=no --enable-dii=no

      - name: build harnesses
        run: |
          set -x
          # NOTE on -fno-sanitize=alignment: libpst.h wraps the ENTIRE public
          # interface, including in-memory trees (pst_desc_tree, pst_item,
          # pst_file), in `#pragma pack(1)`. Every pointer field therefore sits
          # at an unaligned offset, so UBSan's alignment check fires on almost
          # every access. On x86_64 these loads are safe; the check is excluded
          # so it does not drown out genuine findings. The packing is a real
          # portability risk on strict-alignment targets, but removing it is an
          # ABI change to the public headers and is tracked as a reported issue
          # rather than changed here.
          SAN="-fsanitize=fuzzer,address,undefined -fno-sanitize=alignment -fno-sanitize-recover=undefined"
          clang -g -O1 -DHAVE_CONFIG_H -I . -I src $SAN \
            fuzz/fuzz_lzfu.c src/lzfu.c src/debug.c -o fuzz_lzfu
          clang -g -O1 -DHAVE_CONFIG_H -I . -I src $SAN \
            fuzz/fuzz_pst_open.c $COMMON_SRCS -lz -o fuzz_pst_open
          clang -g -O1 -DHAVE_CONFIG_H -I . -I src $SAN \
            fuzz/fuzz_pst_walk.c $COMMON_SRCS -lz -o fuzz_pst_walk

      - name: fuzz pst_lzfu_decompress (~5 min)
        env:
          ASAN_OPTIONS: ${{ env.SAN_OPTS }}
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          mkdir -p fuzz_run_lzfu
          cp fuzz/corpus/* fuzz_run_lzfu/ 2>/dev/null || true
          cp regression/fuzz-corpus/* fuzz_run_lzfu/ 2>/dev/null || true
          cp tests/fixtures/dist-list.pst fuzz_run_lzfu/ 2>/dev/null || true
          ./fuzz_lzfu -max_total_time=300 -rss_limit_mb=2560 -malloc_limit_mb=2048 \
            -dict=fuzz/pst.dict -artifact_prefix=lzfu- fuzz_run_lzfu || {
            echo "::warning::fuzz_lzfu found a crash (uploaded as fuzz-crashes); exploratory, not gating"
            echo "- \`fuzz_lzfu\`: **new crash found** — see the fuzz-crashes artifact" >> "$GITHUB_STEP_SUMMARY"
          }

      - name: fuzz core parse path (~5 min)
        env:
          ASAN_OPTIONS: ${{ env.SAN_OPTS }}
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          mkdir -p fuzz_run_pst
          cp fuzz/corpus/* regression/fuzz-corpus/* fuzz_run_pst/ 2>/dev/null || true
          cp tests/fixtures/dist-list.pst fuzz_run_pst/ 2>/dev/null || true
          ./fuzz_pst_open -max_total_time=300 -rss_limit_mb=2560 -malloc_limit_mb=2048 \
            -dict=fuzz/pst.dict -artifact_prefix=pst- fuzz_run_pst || {
            echo "::warning::fuzz_pst_open found a crash (uploaded as fuzz-crashes); exploratory, not gating"
            echo "- \`fuzz_pst_open\`: **new crash found** — see the fuzz-crashes artifact" >> "$GITHUB_STEP_SUMMARY"
          }

      - name: fuzz folder-walk path (~5 min)
        env:
          ASAN_OPTIONS: ${{ env.SAN_OPTS }}
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          mkdir -p fuzz_run_walk
          cp fuzz/corpus/* regression/fuzz-corpus/* fuzz_run_walk/ 2>/dev/null || true
          cp tests/fixtures/dist-list.pst fuzz_run_walk/ 2>/dev/null || true
          ./fuzz_pst_walk -max_total_time=300 -rss_limit_mb=2560 -malloc_limit_mb=2048 \
            -dict=fuzz/pst.dict -artifact_prefix=walk- fuzz_run_walk || {
            echo "::warning::fuzz_pst_walk found a crash (uploaded as fuzz-crashes); exploratory, not gating"
            echo "- \`fuzz_pst_walk\`: **new crash found** — see the fuzz-crashes artifact" >> "$GITHUB_STEP_SUMMARY"
          }

      - name: upload crash artifacts
        # The fuzz steps above are non-gating (they swallow their exit code),
        # so upload on always() to capture any crash they surfaced.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: |
            lzfu-*
            pst-*
            walk-*
          if-no-files-found: ignore

  asan-ubsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm autoconf automake libtool \
            autoconf-archive gettext autopoint pkg-config zlib1g-dev libgsf-1-dev

      - name: generate config.h
        run: |
          autoreconf -fiv
          ./configure --enable-python=no --enable-dii=no

      - name: build harnesses (ASAN+UBSAN)
        run: |
          # A libFuzzer binary given file arguments replays each file once
          # through LLVMFuzzerTestOneInput, so the same harnesses double as
          # sanitizer replay drivers for the pinned corpus.
          # -fno-sanitize=alignment: see the fuzz job for why the packed
          # public structs make the alignment check unusable here.
          SANF="-fsanitize=fuzzer,address,undefined -fno-sanitize=alignment -fno-sanitize-recover=undefined"
          clang -g -O1 -DHAVE_CONFIG_H -I . -I src $SANF \
            fuzz/fuzz_lzfu.c src/lzfu.c src/debug.c -o replay_lzfu
          clang -g -O1 -DHAVE_CONFIG_H -I . -I src $SANF \
            fuzz/fuzz_pst_open.c $COMMON_SRCS -lz -o replay_pst_full
          clang -g -O1 -DHAVE_CONFIG_H -I . -I src $SANF \
            fuzz/fuzz_pst_walk.c $COMMON_SRCS -lz -o replay_walk

      - name: LE-macro UBSan unit test
        env:
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          # Deterministically catches signed-shift UB in the PST_LE_GET_*
          # little-endian accessors (src/define.h). -I src provides define.h,
          # -I . provides the generated config.h.
          clang -fsanitize=undefined -fno-sanitize-recover=undefined \
            -fno-sanitize=alignment -DHAVE_CONFIG_H -I src -I . \
            tests/test_le_macros.c -o test_le_macros
          ./test_le_macros

      - name: replay pinned regression corpus + valid fixture under sanitizers
        env:
          ASAN_OPTIONS: ${{ env.SAN_OPTS }}:halt_on_error=1:abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          shopt -s nullglob
          files=(regression/fuzz-corpus/* fuzz/corpus/* tests/fixtures/dist-list.pst)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no corpus files to replay"; exit 0
          fi
          echo "replaying ${#files[@]} inputs through all harnesses"
          # Each harness runs the fixed inputs (libFuzzer replays argv files).
          ./replay_lzfu "${files[@]}"
          ./replay_pst_full "${files[@]}"
          ./replay_walk "${files[@]}"

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-tidy clang bear \
            autoconf automake libtool autoconf-archive gettext autopoint \
            pkg-config zlib1g-dev libgsf-1-dev

      - name: generate config.h + compile_commands.json
        run: |
          autoreconf -fiv
          ./configure --enable-python=no --enable-dii=no
          bear -- make -C src || true

      - name: cppcheck (report only, never fails the job)
        run: |
          echo "## cppcheck findings" >> "$GITHUB_STEP_SUMMARY"
          cppcheck --enable=all --inconclusive --std=c11 \
            --suppress=missingIncludeSystem \
            --template='{severity}: {file}:{line}: {id}: {message}' \
            src/*.c 2> cppcheck.txt || true
          # Severity histogram
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cut -d: -f1 cppcheck.txt | sort | uniq -c | sort -rn >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>full cppcheck output</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat cppcheck.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

      - name: clang-tidy (report only, never fails the job)
        run: |
          echo "## clang-tidy findings (core C sources)" >> "$GITHUB_STEP_SUMMARY"
          : > clang-tidy.txt
          for f in src/libpst.c src/lzfu.c src/libstrfunc.c src/vbuf.c src/timeconv.c src/debug.c; do
            clang-tidy "$f" -p . -- -DHAVE_CONFIG_H -I . -I src >> clang-tidy.txt 2>/dev/null || true
          done
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -oE 'warning: .*\[[a-z0-9.-]+\]$' clang-tidy.txt | \
            sed -E 's/.*(\[[a-z0-9.-]+\])$/\1/' | sort | uniq -c | sort -rn | head -40 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: upload static-analysis reports
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis
          path: |
            cppcheck.txt
            clang-tidy.txt
          if-no-files-found: ignore

  coverage:
    # Measures how much of the core parser the corpus actually reaches, and
    # quantifies the coverage the committed valid PST fixture unlocks over the
    # small adversarial seeds alone. Report only; never gates.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm autoconf automake libtool \
            autoconf-archive gettext autopoint pkg-config zlib1g-dev libgsf-1-dev

      - name: generate config.h
        run: |
          autoreconf -fiv
          ./configure --enable-python=no --enable-dii=no

      - name: build coverage-instrumented walk harness
        run: |
          # Source-based coverage + libFuzzer replay driver. -fno-sanitize=alignment
          # for the same packed-struct reason documented in the fuzz job.
          clang -g -O0 -DHAVE_CONFIG_H -I . -I src \
            -fsanitize=fuzzer -fno-sanitize=alignment \
            -fprofile-instr-generate -fcoverage-mapping \
            fuzz/fuzz_pst_walk.c $COMMON_SRCS -lz -o cov_walk

      - name: measure coverage — adversarial seeds only vs. + valid fixture
        run: |
          set -x
          SRCS="src/libpst.c src/lzfu.c src/vbuf.c src/timeconv.c src/libstrfunc.c"

          # Baseline: every adversarial seed EXCEPT the valid PST fixture.
          mkdir -p corpus_base corpus_full
          cp fuzz/corpus/* regression/fuzz-corpus/* corpus_base/ 2>/dev/null || true
          cp corpus_base/* corpus_full/ 2>/dev/null || true
          cp tests/fixtures/dist-list.pst corpus_full/ 2>/dev/null || true

          LLVM_PROFILE_FILE=base.profraw ./cov_walk corpus_base -runs=0 || true
          llvm-profdata merge -sparse base.profraw -o base.profdata
          llvm-cov report ./cov_walk -instr-profile=base.profdata $SRCS > cov_base.txt || true

          LLVM_PROFILE_FILE=full.profraw ./cov_walk corpus_full -runs=0 || true
          llvm-profdata merge -sparse full.profraw -o full.profdata
          llvm-cov report ./cov_walk -instr-profile=full.profdata $SRCS > cov_full.txt || true

          base_line=$(awk '/^TOTAL/{print $4}' cov_base.txt)
          full_line=$(awk '/^TOTAL/{print $4}' cov_full.txt)
          {
            echo "## Parser coverage (libFuzzer walk harness, corpus replay)"
            echo ""
            echo "| corpus | region coverage (TOTAL) |"
            echo "| --- | --- |"
            echo "| adversarial seeds only | ${base_line:-n/a} |"
            echo "| + valid dist-list.pst fixture | ${full_line:-n/a} |"
            echo ""
            echo "<details><summary>full llvm-cov report (with fixture)</summary>"
            echo ""
            echo '```'
            cat cov_full.txt
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            cov_base.txt
            cov_full.txt
          if-no-files-found: ignore

  strict-warnings:
    # Visibility-only: compiles the core with stricter warning sets that are
    # NOT yet part of the -Werror gate (there are many pre-existing hits), so
    # the trend can be watched and burned down over time. Never fails the job.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc clang autoconf automake libtool \
            autoconf-archive gettext autopoint pkg-config zlib1g-dev libgsf-1-dev

      - name: generate config.h
        run: |
          autoreconf -fiv
          ./configure --enable-python=no --enable-dii=no

      - name: strict warning census (report only)
        run: |
          EXTRA="-Wconversion -Wsign-conversion -Wshadow -Wcast-qual -Wpointer-arith"
          : > strict.txt
          for f in $COMMON_SRCS; do
            gcc -fsyntax-only -Wall -Wextra $EXTRA -DHAVE_CONFIG_H -I . -I src \
              $(pkg-config --cflags glib-2.0) "$f" 2>> strict.txt || true
          done
          echo "## Strict-warning census (non-gating)" >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo "Total: $(grep -c 'warning:' strict.txt) warnings across the core sources" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -oE '\[-W[a-z-]+\]' strict.txt | sort | uniq -c | sort -rn | head -30 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: upload strict-warning log
        uses: actions/upload-artifact@v4
        with:
          name: strict-warnings
          path: strict.txt
          if-no-files-found: ignore
